server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Never serve dotfiles or anything unexpected
    location ~ /\. { deny all; }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_types text/css application/javascript application/json application/wasm image/svg+xml;

    # Hashed build assets: cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff always;
        try_files $uri =404;
    }

    # PWA service worker must revalidate on every load
    location ~ ^/(sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options nosniff always;
        try_files $uri =404;
    }

    # Anything that looks like a file (has an extension) is either real or 404.
    # Critically: stale /dev-sw.js requests must 404 so browsers evict the old
    # dev-server service worker instead of receiving the SPA shell as HTML.
    location ~* \.[a-z0-9]+$ {
        try_files $uri =404;
    }

    # SPA fallback for navigation routes only
    location / {
        try_files $uri $uri/ /index.html;
    }
}
